name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # push가 일어나는 브라우저 브랜치가 master인 경우 "master"로 수정 가능

# GITHUB_TOKEN에 Pages 배포 권한을 부여합니다.
permissions:
  contents: read
  pages: write
  id-token: write

# 병렬 배포 빌드를 방지하고 진행 중인 빌드가 있으면 취소합니다.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
